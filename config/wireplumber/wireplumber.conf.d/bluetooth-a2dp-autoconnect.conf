## Auto-connect A2DP playback/capture profiles on Bluetooth devices.
## Prefer high-quality codecs (AAC > SBC-XQ > SBC) and keep music on A2DP.
## Tuned for soundcore P30i (SBC / SBC-XQ / AAC only — no LDAC/aptX).

monitor.bluez.properties = {
  ## Prefer music quality over call latency when selecting profiles
  ## (WirePlumber also has bluetooth.profile-preference = "quality")
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  ## Do not prefer headset (HFP) profile for music
  bluez5.hfphsp-backend = "native"
}

monitor.bluez.rules = [
  {
    matches = [
      {
        device.name = "~bluez_card.*"
      }
    ]
    actions = {
      update-props = {
        ## Stay on A2DP for music; only open HFP when something actually needs the mic
        bluez5.auto-connect = [ a2dp_sink a2dp_source ]
        ## Codec preference order: AAC (best for P30i) → SBC-XQ → SBC
        bluez5.a2dp.aac.bitratemode = 0
        ## 0 = CBR (highest consistent bitrate); 1 = VBR; 2 = constrained VBR
        device.profile = "a2dp-sink"
      }
    }
  }
  {
    matches = [
      {
        ## soundcore P30i (this machine's paired set)
        device.name = "bluez_card.F4_B6_2D_75_CE_92"
      }
    ]
    actions = {
      update-props = {
        bluez5.auto-connect = [ a2dp_sink a2dp_source ]
        bluez5.a2dp.aac.bitratemode = 0
        device.profile = "a2dp-sink"
      }
    }
  }
]
