## CHG-007 — stream policy: Spotify + Google Chrome → Rock EQ
## Meet (Chrome), Zoom, Teams benefit from mic precedence (Phase 1).
## Network EF/DSCP 46 for Meet/Zoom/Teams is handled on the LAN (no host nft).
##
## Default sink is effect_input.eq (Rock). These rules pin music apps to the EQ
## even if a stream had a stale restore target on raw hardware.

stream.rules = [
  {
    matches = [
      { application.name = "Spotify" }
      { application.process.binary = "spotify" }
    ]
    actions = {
      update-props = {
        media.role     = "Music"
        target.object  = "effect_input.eq"
        node.dont-move = false
      }
    }
  }
  {
    matches = [
      { application.name = "Google Chrome" }
      { application.process.binary = "chrome" }
      { application.process.binary = "google-chrome-stable" }
      { application.process.binary = "chromium" }
    ]
    actions = {
      update-props = {
        media.role    = "Music"
        target.object = "effect_input.eq"
      }
    }
  }
  # Native Zoom / Teams (if installed): tag Communication for call path clarity.
  # Output still follows default (EQ → best hardware) unless user moves it.
  {
    matches = [
      { application.name = "~.*[Zz]oom.*" }
      { application.process.binary = "zoom" }
      { application.name = "~.*[Tt]eams.*" }
      { application.process.binary = "teams" }
      { application.process.binary = "teams-for-linux" }
    ]
    actions = {
      update-props = {
        media.role = "Communication"
      }
    }
  }
]
