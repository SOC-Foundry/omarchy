## Global WirePlumber Bluetooth quality settings (WP 0.5 settings API)

wireplumber.settings = {
  ## Prefer high-fidelity A2DP over low-latency headset profiles
  bluetooth.profile-preference = "quality"
  ## Avoid auto-dropping to HFP (call codec) when apps briefly open a mic
  ## Chrome input is often a culprit on this machine — keep A2DP for music.
  bluetooth.autoswitch-to-headset-profile = false
}
