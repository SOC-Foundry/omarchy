## CHG-007 — device precedence (sinks + sources)
## Host: 83te (Yoga 7 2-in-1 16IPH11)
##
## Output order:
##   1. soundcore P30i          (BT A2DP)     priority ~2500
##   2. Lenovo USB-C In-Ear                   ~1500
##   3. Built-in sof-soundwire speakers       ~400
##
## Input order (among available sources):
##   1. soundcore P30i mic (HFP only; A2DP has no capture)
##   2. Lenovo USB-C mic
##   3. Built-in dmic
##   4. USB camera mic last
##
## Built-in card uses pro-audio so both speakers + dmic exist as last-resort
## I/O. All pro nodes are heavily deprioritized vs BT/USB.

# ---------------------------------------------------------------------------
# Bluetooth (soundcore P30i and any future BT headsets)
# ---------------------------------------------------------------------------
monitor.bluez.rules = [
  # Generic BT first; P30i-specific rules below override
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2400
        priority.driver  = 2400
      }
    }
  }
  {
    matches = [
      { node.name = "~bluez_input.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2400
        priority.driver  = 2400
      }
    }
  }
  {
    matches = [
      { node.name = "~bluez_output.F4_B6_2D_75_CE_92.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2500
        priority.driver  = 2500
        node.nick        = "soundcore P30i"
      }
    }
  }
  {
    matches = [
      { node.name = "~bluez_input.F4_B6_2D_75_CE_92.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2500
        priority.driver  = 2500
        node.nick        = "soundcore P30i Mic"
      }
    }
  }
]

# ---------------------------------------------------------------------------
# ALSA: Lenovo USB-C, built-in, camera
# ---------------------------------------------------------------------------
monitor.alsa.rules = [
  # --- Lenovo USB-C Wired In-Ear (Synaptics 17ef:a05f) — backup ---
  {
    matches = [
      { node.name = "~alsa_output.usb-Synaptics_Lenovo_USB-C_Wired_In-Ear.*" }
    ]
    actions = {
      update-props = {
        priority.session = 1500
        priority.driver  = 1500
        node.nick        = "Lenovo USB-C"
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.usb-Synaptics_Lenovo_USB-C_Wired_In-Ear.*" }
    ]
    actions = {
      update-props = {
        priority.session = 1500
        priority.driver  = 1500
        node.nick        = "Lenovo USB-C Mic"
      }
    }
  }
  # Device-level: keep dual profile (stereo out + mono mic)
  {
    matches = [
      {
        device.name = "~alsa_card.usb-Synaptics_Lenovo_USB-C_Wired_In-Ear.*"
      }
    ]
    actions = {
      update-props = {
        device.profile = "output:analog-stereo+input:mono-fallback"
      }
    }
  }

  # --- Built-in sof-soundwire (last resort) ---
  # pro-audio exposes speakers + dmic; deprioritize vs BT/USB.
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3-platform-sof_sdw"
      }
    ]
    actions = {
      update-props = {
        device.profile = "pro-audio"
      }
    }
  }
  # Disable non-primary pro I/O so the device list stays clean.
  # Speakers = pro-output-0, dmic = pro-input-1 only.
  {
    matches = [
      {
        node.name = "~alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-[1-9].*"
      }
      {
        node.name = "~alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-3.*"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-0"
      }
    ]
    actions = {
      update-props = {
        priority.session = 400
        priority.driver  = 400
        node.nick        = "Built-in Speakers"
      }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-1[0-9].*"
      }
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-10"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-1"
      }
    ]
    actions = {
      update-props = {
        priority.session = 400
        priority.driver  = 400
        node.nick        = "Built-in Mic"
      }
    }
  }

  # --- USB camera mic — last ---
  {
    matches = [
      { node.name = "~alsa_input.usb-Sonix_Technology.*" }
      { node.name = "~alsa_input.usb-.*Camera.*" }
    ]
    actions = {
      update-props = {
        priority.session = 50
        priority.driver  = 50
        node.nick        = "USB Camera Mic"
      }
    }
  }
]
