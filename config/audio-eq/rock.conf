# Rock EQ for soundcore P30i — punchy low end, present mids, bright cymbals
# Bands: 80 Hz shelf | 220 Hz | 800 Hz | 2.5 kHz | 5 kHz | 10 kHz shelf
# CHG-007: default always-on preset for Spotify + Google Chrome (YouTube TV)
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "EQ Rock"
            media.name       = "EQ Rock"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_lowshelf
                        control = { "Freq" = 80.0 "Q" = 0.7 "Gain" = 4.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 220.0 "Q" = 1.0 "Gain" = -2.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 800.0 "Q" = 1.0 "Gain" = 1.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 2500.0 "Q" = 1.0 "Gain" = 3.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 5000.0 "Q" = 1.2 "Gain" = 2.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_6
                        label = bq_highshelf
                        control = { "Freq" = 10000.0 "Q" = 0.7 "Gain" = 2.5 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.eq"
                media.class = Audio/Sink
                audio.channels = 2
                # High session priority so default-node selection prefers EQ
                # when it is present; hardware priorities still drive EQ output.
                priority.session = 3000
                priority.driver  = 3000
            }
            playback.props = {
                node.name    = "effect_output.eq"
                node.passive = true
                media.class  = Stream/Output/Audio
                media.role   = "DSP"
            }
        }
    }
]
