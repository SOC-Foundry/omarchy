# EDM EQ for soundcore P30i — heavy sub/kick, clean mids, airy tops
# Bands: 60 Hz shelf | 200 Hz | 600 Hz | 3 kHz | 6 kHz | 12 kHz shelf
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "EQ EDM"
            media.name       = "EQ EDM"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_lowshelf
                        control = { "Freq" = 60.0 "Q" = 0.7 "Gain" = 5.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 200.0 "Q" = 1.0 "Gain" = -2.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 600.0 "Q" = 1.0 "Gain" = -1.0 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 3000.0 "Q" = 1.0 "Gain" = 1.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 6000.0 "Q" = 1.2 "Gain" = 2.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_6
                        label = bq_highshelf
                        control = { "Freq" = 12000.0 "Q" = 0.7 "Gain" = 3.0 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.eq"
                media.class = Audio/Sink
                audio.channels = 2
                priority.session = 3000
                priority.driver  = 3000
            }
            playback.props = {
                node.name    = "effect_output.eq"
                node.passive = true
                media.class  = Stream/Output/Audio
                media.role   = "DSP"
            }
        }
    }
]
